<form class="form-horizontal" autocomplete="off" #createObraModal="ngForm" (ngSubmit)="save()">
    <abp-modal-header [title]="'CreateObra' | localize" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>
    <div class="modal-body">
        <tabset>
            <tab [heading]="'ObraDetails' | localize" class="pt-3 px-2">
                <div class="form-group row required">
                    <label class="col-md-3 col-form-label" for="nome">
                        Nome
                    </label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" name="nome" id="nome" required maxlength="64"
                            [(ngModel)]="obra.nome" #nomeModel="ngModel" #nomeEl />
                        <abp-validation-summary [control]="nomeModel" [controlEl]="nomeEl"></abp-validation-summary>
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-md-3 col-form-label" for="descricao">
                        Descrição
                    </label>
                    <div class="col-md-9">
                        <textarea class="form-control" name="descricao" id="descricao"
                            [(ngModel)]="obra.descricao" #descricaoModel="ngModel" #descricaoEl></textarea>
                        <abp-validation-summary [control]="descricaoModel"
                            [controlEl]="descricaoEl"></abp-validation-summary>
                    </div>
                </div>
                <div class="form-group row required">
                    <label class="col-md-3 col-form-label" for="dataInicio">
                        Data de Início
                    </label>
                    <div class="col-md-9">
                        <input type="date" class="form-control" name="dataInicio" id="dataInicio" required
                            [(ngModel)]="dataInicio" #dataInicioModel="ngModel" #dataInicioEl />
                        <abp-validation-summary [control]="dataInicioModel"
                            [controlEl]="dataInicioEl"></abp-validation-summary>
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-md-3 col-form-label" for="dataPrevistaTermino">
                        Data Prevista de Término
                    </label>
                    <div class="col-md-9">
                        <input type="date" class="form-control" name="dataPrevistaTermino" id="dataPrevistaTermino"
                            [(ngModel)]="dataPrevistaTermino" #dataPrevistaTerminoModel="ngModel"
                            #dataPrevistaTerminoEl />
                        <abp-validation-summary [control]="dataPrevistaTerminoModel"
                            [controlEl]="dataPrevistaTerminoEl"></abp-validation-summary>
                    </div>
                </div>

            </tab>
            <tab [heading]="'Endereco' | localize" class="pt-3 px-2">
                <div class="form-group row">
                    <label class="col-md-3 col-form-label" for="rua">Rua</label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" id="rua" name="rua" maxlength="128"
                            [(ngModel)]="obra.endereco.rua" required />
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-md-3 col-form-label" for="numero">Número</label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" id="numero" name="numero" maxlength="16"
                            [(ngModel)]="obra.endereco.numero" required />
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-md-3 col-form-label" for="bairro">Bairro</label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" id="bairro" name="bairro" maxlength="64"
                            [(ngModel)]="obra.endereco.bairro" required />
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-md-3 col-form-label" for="cidade">Cidade</label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" id="cidade" name="cidade" maxlength="64"
                            [(ngModel)]="obra.endereco.cidade" required />
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-md-3 col-form-label" for="uf">UF</label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" id="uf" name="uf" maxlength="2"
                            [(ngModel)]="obra.endereco.uf" required />
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-md-3 col-form-label" for="cep">CEP</label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" id="cep" name="cep" maxlength="10"
                            [(ngModel)]="obra.endereco.cep" required />
                    </div>
                </div>
            </tab>
            <tab [heading]="'Proprietarios' | localize" class="pt-3 px-2">
                <div *ngFor="let proprietario of proprietarios; let i = index"
                    class="border rounded p-3 mb-3 position-relative">
                    <div class="form-group row">
                        <label class="col-md-3 col-form-label" for="proprietario_nome_{{ i }}">Nome</label>
                        <div class="col-md-9">
                            <input type="text" class="form-control" id="proprietario_nome_{{ i }}"
                                name="proprietario_nome_{{ i }}" [(ngModel)]="proprietario.nome" required
                                maxlength="128" />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label class="col-md-3 col-form-label" for="proprietario_cpf_{{ i }}">CPF/CNPJ</label>
                        <div class="col-md-9">
                            <input type="text" class="form-control" id="proprietario_cpf_{{ i }}"
                                name="proprietario_cpf_{{ i }}" [(ngModel)]="proprietario.cpfOrCnpj" required
                                maxlength="18" />
                        </div>
                    </div>

                    <div class="text-end">
                        <button type="button" class="btn btn-danger btn-sm" (click)="removerProprietario(i)">
                            Remover Proprietário
                        </button>
                    </div>
                </div>

                <div class="text-start mt-2">
                    <button type="button" class="btn btn-primary" (click)="adicionarProprietario()">
                        + Adicionar Proprietário
                    </button>
                </div>
            </tab>
            <tab [heading]="'Encarregados' | localize" class="pt-3 px-2">
                <div *ngFor="let encarregado of encarregados; let i = index"
                    class="border rounded p-3 mb-3 position-relative">

                    <!-- Nome -->
                    <div class="form-group row">
                        <label class="col-md-3 col-form-label" for="encarregado_nome_{{ i }}">Nome</label>
                        <div class="col-md-9">
                            <input type="text" class="form-control" id="encarregado_nome_{{ i }}"
                                name="encarregado_nome_{{ i }}" [(ngModel)]="encarregado.nome" required
                                maxlength="128" />
                        </div>
                    </div>

                    <!-- CPF/CNPJ -->
                    <div class="form-group row">
                        <label class="col-md-3 col-form-label" for="encarregado_cpf_{{ i }}">CPF/CNPJ</label>
                        <div class="col-md-9">
                            <input type="text" class="form-control" id="encarregado_cpf_{{ i }}"
                                name="encarregado_cpf_{{ i }}" [(ngModel)]="encarregado.cpfOrCnpj" required
                                maxlength="18" />
                        </div>
                    </div>

                    <!-- Telefone: DDD -->
                    <div class="form-group row">
                        <label class="col-md-3 col-form-label" for="encarregado_ddd_{{ i }}">DDD</label>
                        <div class="col-md-3">
                            <input type="text" class="form-control" id="encarregado_ddd_{{ i }}"
                                name="encarregado_ddd_{{ i }}" [(ngModel)]="encarregado.telefone.ddd" required
                                maxlength="3" pattern="^[0-9]{2,3}$" title="DDD deve conter 2 ou 3 dígitos numéricos" />
                        </div>

                        <!-- Telefone: Número -->
                        <label class="col-md-1 col-form-label mr-2" for="encarregado_numero_{{ i }}">Número</label>
                        <div class="col-md-3">
                            <input type="text" class="form-control" id="encarregado_numero_{{ i }}"
                                name="encarregado_numero_{{ i }}" [(ngModel)]="encarregado.telefone.numero" required
                                maxlength="10" pattern="^[0-9]{8,10}$"
                                title="Número deve conter entre 8 e 10 dígitos numéricos" />
                        </div>
                    </div>

                    <div class="text-end">
                        <button type="button" class="btn btn-danger btn-sm" (click)="removerEncarregado(i)">
                            Remover Encarregado
                        </button>
                    </div>
                </div>

                <div class="text-start mt-2">
                    <button type="button" class="btn btn-primary" (click)="adicionarEncarregado()">
                        + Adicionar Encarregado
                    </button>
                </div>
            </tab>

        </tabset>
    </div>
    <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="!createObraModal.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()"></abp-modal-footer>
</form>
