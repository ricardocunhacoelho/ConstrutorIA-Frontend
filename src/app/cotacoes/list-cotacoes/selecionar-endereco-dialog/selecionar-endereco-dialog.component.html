<div class="modal-header">
    <h5 class="modal-title">Endereço de entrega</h5>
    <button type="button" class="btn-close" (click)="cancelar()">
        <i class="fa fa-times"></i>
    </button>
</div>

<div class="modal-body">

    <div class="endereco-option mb-3"
         [class.selected]="tipoEntrega === 'OBRA'"
         (click)="tipoEntrega = 'OBRA'">

        <div class="card shadow-sm p-3 cursor-pointer">
            <strong class="d-block mb-1 fs-5">Endereço da obra</strong>

            <div class="text-muted fs-7">
                {{ enderecoObraFormatado }}
            </div>

            <small class="text-success fs-7" *ngIf="tipoEntrega === 'OBRA'">
                <i class="fa fa-check-circle mr-1"></i>
                Selecionado
            </small>
        </div>
    </div>

    <div class="form-check mb-2">
        <input class="form-check-input"
               type="radio"
               id="optOutro"
               [(ngModel)]="tipoEntrega"
               value="OUTRO">

        <label class="form-check-label" for="optOutro">
            Informar outro endereço
        </label>
    </div>

    <div class="form-check mb-4">
        <input class="form-check-input"
               type="radio"
               id="optRetirada"
               [(ngModel)]="tipoEntrega"
               value="RETIRADA">

        <label class="form-check-label" for="optRetirada">
            Retirar com o fornecedor
        </label>
    </div>

    <div *ngIf="tipoEntrega === 'OUTRO'">

        <div class="mb-2">
            <label>Rua</label>
            <input type="text" class="form-control" [(ngModel)]="endereco.rua">
        </div>

        <div class="mb-2">
            <label>Número</label>
            <input type="text" class="form-control" [(ngModel)]="endereco.numero">
        </div>

        <div class="mb-2">
            <label>Bairro</label>
            <input type="text" class="form-control" [(ngModel)]="endereco.bairro">
        </div>

        <div class="mb-2">
            <label>Cidade</label>
            <input type="text" class="form-control" [(ngModel)]="endereco.cidade">
        </div>

        <div class="mb-2">
            <label>UF</label>
            <input type="text" maxlength="2" class="form-control" [(ngModel)]="endereco.uf">
        </div>

        <div class="mb-2">
            <label>CEP</label>
            <input type="text" maxlength="9" class="form-control" [(ngModel)]="endereco.cep">
        </div>

    </div>

</div>

<div class="modal-footer">
    <button class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    <button class="btn btn-primary" (click)="confirmar()">Confirmar</button>
</div>
