<form class="form-horizontal" autocomplete="off" #createCotacaoModal="ngForm" (ngSubmit)="save()">
    <abp-modal-header [title]="'Criar Cotação' | localize" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>
    <div class="modal-body">
        <tabset>
            <tab [heading]="'Detalhes da Cotação' | localize" class="pt-3 px-2">

                <div *ngFor="let mat of materiais; let i = index" class="border rounded p-3 mb-3">
                    <div class="form-group row">
                        <label class="col-md-3 col-form-label">Material</label>
                        <div class="col-md-9">
                            <input type="text" class="form-control" [(ngModel)]="mat.nome" name="mat_nome_{{i}}" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-md-3 col-form-label">Quantidade</label>
                        <div class="col-md-3">
                            <input type="text" class="form-control" [(ngModel)]="mat.quantidade"
                                name="mat_quantidade_{{i}}" />
                        </div>
                        <label class="col-md-1 col-form-label mr-2">Unidade</label>
                        <div class="col">
                            <input type="text" class="form-control" [(ngModel)]="mat.unidade"
                                name="mat_unidade_{{i}}" />
                        </div>
                    </div>
                    <div class="text-end">
                        <button type="button" class="btn btn-danger btn-sm"
                            (click)="removerMaterial(i)">Remover</button>
                    </div>
                </div>

                <div class="text-start mt-2">
                    <button type="button" class="btn btn-primary" (click)="adicionarMaterial()">+ Adicionar
                        Material</button>
                </div>

            </tab>

            <tab [heading]="'Observações (opcional)' | localize" class="pt-3 px-2">

                <!-- Observação Interna -->
                <div class="form-group row">
                    <label class="col-md-3 col-form-label">
                        Observação Interna
                    </label>

                    <div class="col-md-9">
                        <textarea class="form-control" rows="3" [(ngModel)]="cotacao.observacaoInterna"
                            name="obsInterna" placeholder="Uso interno apenas. Não será enviada ao fornecedor.
Ex: anotações administrativas, fornecedor preferencial, prazos combinados internamente.">
            </textarea>

                        <small class="form-text text-muted">
                            Uso exclusivo da equipe interna. Este conteúdo <strong>não será enviado</strong> ao
                            fornecedor.
                        </small>
                    </div>
                </div>

                <!-- Observação Fornecedor -->
                <div class="form-group row mt-3">
                    <label class="col-md-3 col-form-label">
                        Observação para o Fornecedor
                    </label>

                    <div class="col-md-9">
                        <textarea class="form-control" rows="3" [(ngModel)]="cotacao.observacaoFornecedor"
                            name="obsFornecedor" placeholder="Esta observação será enviada junto com a lista de materiais. 
Ex: informar prazo de entrega, condições de pagamento, possibilidade de marca equivalente.">
                        </textarea>

                        <small class="form-text text-warning">
                            ⚠️ Atenção: esta observação será enviada diretamente ao fornecedor junto da lista de
                            materiais.
                        </small>
                    </div>
                </div>

            </tab>


            <tab [heading]="'Fornecedores' | localize" class="pt-3 px-2">
                <app-fornecedor-multiselect [fornecedoresDisponiveis]="fornecedoresDisponiveis"
                    [fornecedoresSelecionados]="fornecedoresSelecionados"
                    (fornecedoresChange)="fornecedoresSelecionados = $event">
                </app-fornecedor-multiselect>
            </tab>


        </tabset>
    </div>

    <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="saving"
        (onCancelClick)="bsModalRef.hide()"></abp-modal-footer>
</form>
