<li class="nav-item dropdown notificacoes">
  <a class="nav-link" (click)="toggleDropdown()">
    <i class="far fa-bell"></i>

    <span class="badge" *ngIf="naoLidas > 0">
      {{ naoLidas }}
    </span>
  </a>

  <div class="dropdown-menu" [class.show]="aberto">
    <div class="dropdown-header">
      Notificações
    </div>

    <div class="lista">
      <div
        class="item"
        *ngFor="let n of notificacoes"
        [class.nao-lida]="!n.lida"
        (click)="abrirNotificacao(n)"
      >
        <strong>{{ n.titulo }}</strong>
        <p>{{ n.descricao }}</p>
        <small>{{ n.creationTime | date:'dd/MM/yyyy HH:mm' }}</small>
      </div>

      <div class="vazio" *ngIf="notificacoes.length === 0">
        Nenhuma notificação
      </div>
    </div>
  </div>
</li>
