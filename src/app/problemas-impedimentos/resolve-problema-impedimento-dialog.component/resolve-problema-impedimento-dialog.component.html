<abp-modal-header [title]="'Resolver Problema/Impedimento' | localize" (onCloseClick)="close()">
</abp-modal-header>

<div class="modal-body">
    <div class="form-group">
        <label for="resolucao">Resolução</label>
        <textarea class="form-control" id="resolucao" rows="5" [(ngModel)]="resolucao" 
            placeholder="Descreva como o problema foi resolvido..." required></textarea>
        <small class="form-text text-muted">Detalhe as ações tomadas para resolver o problema.</small>
    </div>

    <div *ngIf="saving" class="text-center p-3">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Salvando...</span>
        </div>
    </div>
</div>

<abp-modal-footer [cancelDisabled]="false" [saveDisabled]="!resolucao || saving" 
    (onCancelClick)="close()" (onSaveClick)="save()">
</abp-modal-footer>
